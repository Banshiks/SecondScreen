name: Build APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Build Host APK
        run: cd host-app && gradle assembleDebug
      - name: Build Client APK
        run: cd client-app && gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: SecondScreen-HOST-tablet
          path: host-app/build/outputs/apk/debug/*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: SecondScreen-CLIENT-nothing-phone
          path: client-app/build/outputs/apk/debug/*.apk
